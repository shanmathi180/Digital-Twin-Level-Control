<!DOCTYPE html>
<html>

<head>
    <title>Digital Twin Dashboard</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            background: white;
            padding: 30px;
            border-radius: 25px;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        h2 {
            margin: 0;
            color: #333;
            font-size: 28px;
        }

        h3 {
            margin: 5px 0 20px 0;
            color: #03a9f4;
            font-size: 20px;
        }

        .prediction-box {
            background: #eef7ff;
            padding: 20px;
            border-radius: 15px;
            border-left: 6px solid #2196f3;
            margin-bottom: 25px;
        }

        .prediction-label {
            display: block;
            margin-top: 8px;
            color: #444;
            font-size: 17px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 17px;
            color: #333;
        }

        input {
            width: 60px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .scale-mark {
            position: absolute;
            color: #666;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>
    <div class="ui-panel">
        <h2>Level: <span id="levelText">0.0</span> cm</h2>
        <h3 id="percentText">Fill: 0%</h3>
        <div class="prediction-box">
            <b style="color: #2196f3; font-size: 12px;">AI PREDICTION</b>
            <div class="prediction-label">Trend: <span id="trendText">Stable</span></div>
            <div class="prediction-label">Time to Setpoint: <span id="timeText">--</span></div>
        </div>
        <div class="controls">Set Point: <input type="number" id="setPointInput" value="8.0"> cm</div>
        <button id="sendSetPoint">Update</button>
    </div>
    <div id="labels"></div>
    <script
        type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module" src="3d.js"></script>
</body>

</html>
